name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  android:
    name: Build Android APK
    runs-on: windows-latest
    environment: deploy

    env:
      DOTNET_NOLOGO: true
      PROJECT_PATH: Agnosia.Android/Agnosia.Android.csproj
      RELEASE_DIR: artifacts/release

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.202"
          workloads: android

      - name: Restore
        run: dotnet restore Agnosia.sln

      - name: Validate signing secrets
        shell: pwsh
        run: |
          $requiredSecrets = @{
            ANDROID_KEYSTORE_BASE64 = "${{ secrets.ANDROID_KEYSTORE_BASE64 }}"
            ANDROID_KEYSTORE_ALIAS = "${{ secrets.ANDROID_KEYSTORE_ALIAS }}"
            ANDROID_KEYSTORE_PASSWORD = "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
            ANDROID_KEY_PASSWORD = "${{ secrets.ANDROID_KEY_PASSWORD }}"
          }

          $missingSecrets = $requiredSecrets.GetEnumerator() |
            Where-Object { [string]::IsNullOrWhiteSpace($_.Value) } |
            ForEach-Object { $_.Key }

          if ($missingSecrets) {
            throw "Missing required signing secrets: $($missingSecrets -join ', ')"
          }

      - name: Decode signing keystore
        shell: pwsh
        run: |
          $keystorePath = Join-Path $env:RUNNER_TEMP "agnosia-release.keystore"
          [IO.File]::WriteAllBytes($keystorePath, [Convert]::FromBase64String("${{ secrets.ANDROID_KEYSTORE_BASE64 }}"))
          "ANDROID_KEYSTORE_PATH=$keystorePath" >> $env:GITHUB_ENV

      - name: Publish APK variants
        shell: pwsh
        env:
          ANDROID_KEYSTORE_ALIAS: ${{ secrets.ANDROID_KEYSTORE_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          if ($tag -notmatch '^v(?<major>\d+)\.(?<minor>\d+)(?:\.(?<patch>\d+))?$') {
            throw "Release tag must use vMAJOR.MINOR or vMAJOR.MINOR.PATCH format, got '$tag'."
          }

          $major = [int]$Matches.major
          $minor = [int]$Matches.minor
          $patch = if ($Matches.patch) { [int]$Matches.patch } else { 0 }
          if ($minor -gt 999 -or $patch -gt 999) {
            throw "Android versionCode mapping supports minor and patch values from 0 to 999."
          }

          $displayVersion = $tag.Substring(1)
          $androidVersionCode = ($major * 1000000) + ($minor * 1000) + $patch
          New-Item -ItemType Directory -Force -Path $env:RELEASE_DIR | Out-Null

          $variants = @(
            @{
              Name = "universal"
              AssetName = "Agnosia-universal.apk"
              PackageVariant = "universal"
              RuntimeIdentifier = $null
            },
            @{
              Name = "armeabi-v7a"
              AssetName = "Agnosia-armeabi-v7a.apk"
              RuntimeIdentifier = "android-arm"
            },
            @{
              Name = "arm64-v8a"
              AssetName = "Agnosia-arm64-v8a.apk"
              RuntimeIdentifier = "android-arm64"
            }
          )

          foreach ($variant in $variants) {
            $variantName = $variant.Name
            $publishArgs = @(
              "publish", $env:PROJECT_PATH,
              "-f", "net10.0-android",
              "-c", "Release",
              "-p:AppVersion=$displayVersion",
              "-p:Version=$displayVersion",
              "-p:InformationalVersion=$tag",
              "-p:ApplicationDisplayVersion=$displayVersion",
              "-p:ApplicationVersion=$androidVersionCode",
              "-p:AndroidPackageFormat=apk",
              "-p:AndroidKeyStore=true",
              "-p:AndroidSigningKeyStore=$env:ANDROID_KEYSTORE_PATH",
              "-p:AndroidSigningKeyAlias=$env:ANDROID_KEYSTORE_ALIAS",
              "-p:AndroidSigningStorePass=env:ANDROID_KEYSTORE_PASSWORD",
              "-p:AndroidSigningKeyPass=env:ANDROID_KEY_PASSWORD"
            )

            if (-not [string]::IsNullOrWhiteSpace($variant.RuntimeIdentifier)) {
              $publishArgs += @("-r", $variant.RuntimeIdentifier)
            }

            if (-not [string]::IsNullOrWhiteSpace($variant.PackageVariant)) {
              $publishArgs += @("-p:AgnosiaAndroidPackageVariant=$($variant.PackageVariant)")
            }

            dotnet @publishArgs
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }

            $apk = Get-ChildItem -Path Agnosia.Android/bin/Release/net10.0-android -Recurse -Filter "*.apk" |
              Where-Object { $_.FullName -match "\\publish\\" } |
              Sort-Object LastWriteTime -Descending |
              Select-Object -First 1

            if (-not $apk) {
              throw "Published APK for $variantName was not found."
            }

            $assetPath = Join-Path $env:RELEASE_DIR $variant.AssetName
            Copy-Item -LiteralPath $apk.FullName -Destination $assetPath -Force
          }

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: agnosia-${{ github.ref_name }}-apk
          path: artifacts/release/*.apk
          if-no-files-found: error

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $apkAssets = Get-ChildItem -Path $env:RELEASE_DIR -Filter "*.apk" |
            Sort-Object Name |
            ForEach-Object { $_.FullName }

          if (-not $apkAssets) {
            throw "No APK assets were found."
          }

          gh release create $env:GITHUB_REF_NAME @apkAssets `
            --verify-tag `
            --generate-notes `
            --title "Agnosia $env:GITHUB_REF_NAME"
